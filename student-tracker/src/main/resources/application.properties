# ===============================
# APP CONFIG
# ===============================
spring.application.name=student-tracker
server.port=8080
server.servlet.context-path=/

# ===============================
# DATABASE (H2 In-Memory for FAST LOCAL DEV)
# ===============================
spring.datasource.url=jdbc:h2:file:./data/student_tracker
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
#spring.jpa.defer-datasource-initialization=true

# ===============================
# FLYWAY (DISABLED)
# ===============================
spring.flyway.enabled=false

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# ===============================
# 🔴 IMPORTANT: DISABLE DEFAULT SPRING SECURITY USER
# ===============================
spring.security.user.name=
spring.security.user.password=

# ===============================
# LOGGING
# ===============================
logging.level.com.tracker=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO

# ===============================
# CONNECTION POOL
# ===============================
# spring.datasource.hikari.maximum-pool-size=20

# ===============================
# JACKSON
# ===============================
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

