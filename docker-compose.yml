version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: student_tracker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: student_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kotaiit567
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-setup.sql:/docker-entrypoint-initdb.d/1-setup.sql:ro
      - ./fix_passwords.sql:/docker-entrypoint-initdb.d/2-fix.sql:ro
    networks:
      - student_tracker_network

  backend:
    build: 
      context: ./student-tracker
      dockerfile: Dockerfile
    container_name: student_tracker_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/student_tracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: kotaiit567
      JWT_SECRET: mySecretKey123456789012345678901234567890
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres
    networks:
      - student_tracker_network

  frontend:
    build: ./frontend
    container_name: student_tracker_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - student_tracker_network

volumes:
  postgres_data:

networks:
  student_tracker_network:
    driver: bridge

